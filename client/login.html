<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h4 class="text-center">Admin Login</h4>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Mật khẩu">
        <button class="btn btn-primary w-100" onclick="login()">Đăng nhập</button>
        <div id="error" class="text-danger mt-2 small"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdmDXFdXeVx9sBhQSDpjxgETPzxSjjOUY",
            authDomain: "pct-news-aec76.firebaseapp.com",
            projectId: "pct-news-aec76",
            appId: "1:285083279404:web:068fe440e5855aeab3f189"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const allowedAdminEmails = ["admin@pct-news.com"];
        const sessionKey = "pctAdminSession";
        const error = document.getElementById("error");
        const loginButton = document.getElementById("loginButton");
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const loginSpinner = document.getElementById("loginSpinner");
        let loginInProgress = false;

        function getCurrentPage() {
            return window.location.pathname.split("/").pop().toLowerCase();
        }

        function isAdminPage() {
            return getCurrentPage() === "admin.html";
        }

        function isValidAdminEmail(email) {
            return allowedAdminEmails.includes(String(email).trim().toLowerCase());
        }

        function validateEmailFormat(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(message) {
            if (error) {
                error.innerText = message;
            }
        }

        function clearError() {
            if (error) {
                error.innerText = "";
            }
        }

        function setLoading(isLoading) {
            loginInProgress = isLoading;
            if (loginButton) {
                loginButton.disabled = isLoading;
            }
            if (loginSpinner) {
                loginSpinner.classList.toggle("d-none", !isLoading);
            }
            const buttonText = loginButton?.querySelector(".button-text");
            if (buttonText) {
                buttonText.textContent = isLoading ? "Đang đăng nhập..." : "Đăng nhập";
            }
        }

        function getFirebaseErrorMessage(err) {
            if (!err) {
                return "Lỗi đăng nhập.";
            }
            switch (err.code) {
                case "auth/user-not-found":
                    return "Email không tồn tại.";
                case "auth/wrong-password":
                    return "Mật khẩu sai.";
                case "auth/invalid-email":
                    return "Email không hợp lệ.";
                case "auth/too-many-requests":
                    return "Quá nhiều lần thử. Vui lòng thử lại sau.";
                case "auth/network-request-failed":
                    return "Lỗi mạng. Kiểm tra kết nối.";
                default:
                    return err.message || "Lỗi đăng nhập.";
            }
        }

        async function handleAuthorizedUser(user) {
            if (!user) {
                return;
            }

            if (!isValidAdminEmail(user.email)) {
                await signOut(auth);
                showError("Tài khoản không có quyền truy cập Admin.");
                return;
            }

            const hasSession = sessionStorage.getItem(sessionKey) === "active";
            if (!isAdminPage() && hasSession) {
                window.location.href = "admin.html";
            }
        }

        window.login = async function () {
            if (loginInProgress) {
                return;
            }

            clearError();
            const email = document.getElementById("email").value?.trim();
            const password = passwordInput?.value || "";

            if (!email || !password) {
                showError("Vui lòng nhập email và mật khẩu.");
                return;
            }

            if (!validateEmailFormat(email)) {
                showError("Email không hợp lệ.");
                return;
            }

            if (!isValidAdminEmail(email)) {
                showError("Email không có quyền truy cập Admin.");
                return;
            }

            setLoading(true);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                if (!isValidAdminEmail(user.email)) {
                    await signOut(auth);
                    showError("Email không có quyền truy cập Admin.");
                    return;
                }

                sessionStorage.setItem(sessionKey, "active");
                window.location.href = "admin.html";
            } catch (err) {
                showError(getFirebaseErrorMessage(err));
            } finally {
                setLoading(false);
            }
        };

        window.logout = async function () {
            setLoading(false);
            sessionStorage.removeItem(sessionKey);
            try {
                await signOut(auth);
            } catch {
            }
            if (!isAdminPage()) {
                window.location.href = "login.html";
            }
        };

        togglePassword?.addEventListener("click", () => {
            if (!passwordInput) {
                return;
            }
            const isHidden = passwordInput.type === "password";
            passwordInput.type = isHidden ? "text" : "password";
            togglePassword.textContent = isHidden ? "Ẩn" : "Hiện";
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await handleAuthorizedUser(user);
            }
        });
    </script>
</body>
</html>
