<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin</title>
    <link rel="icon" href="/assets/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h4 class="text-center">Admin Login</h4>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Mật khẩu">
        <button class="btn btn-primary w-100" onclick="login()">Đăng nhập</button>
        <div id="error" class="text-danger mt-2 small"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdmDXFdXeVx9sBhQSDpjxgETPzxSjjOUY",
            authDomain: "pct-news-aec76.firebaseapp.com",
            projectId: "pct-news-aec76",
            appId: "1:285083279404:web:068fe440e5855aeab3f189"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // FIX: khai báo error element
        const error = document.getElementById("error");

        window.login = async function () {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "admin.html";
            } catch (err) {
                error.innerText = "Sai email hoặc mật khẩu";
            }
        };

        // AUTO LOGIN (ổn định hơn)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "admin.html";
            }
        });
    </script>
</body>
</html>
